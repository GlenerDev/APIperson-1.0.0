<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - API Pessoa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="nav"><div class="brand">API Pessoal</div><div><a href="index.html">Início</a></div></nav>
  <main class="container">
    <div class="card" style="max-width:420px;margin:0 auto;">
      <h2 class="header-title">Entrar</h2>
      <form id="login-form">
        <div class="form-row"><label for="email">E-mail</label><input id="email" type="email" required></div>
        <div class="form-row"><label for="password">Senha</label><input id="password" type="password" required></div>
        <div style="text-align:right"><button class="btn" type="submit">Entrar</button></div>
      </form>
      <p style="margin-top:12px">Não tem conta? <a href="register.html">Registre-se</a></p>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
