<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro - API Pessoa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="nav"><div class="brand">API Pessoal</div><div><a href="index.html">Início</a></div></nav>
  <main class="container">
    <div class="card" style="max-width:540px;margin:0 auto;">
      <h2 class="header-title">Criar conta</h2>
      <form id="register-form" novalidate>
        <div id="form-messages" style="margin-bottom:10px;color:#ffcc80;font-weight:600"></div>
        <div class="form-row"><label for="r-name">Nome</label><input id="r-name" name="name" required aria-required="true" placeholder="Seu nome completo"></div>
        <div class="form-row"><label for="r-email">E-mail</label><input id="r-email" name="email" type="email" required aria-required="true" placeholder="seu@exemplo.com"></div>
        <div class="form-row"><label for="r-password">Senha</label><input id="r-password" name="password" type="password" required aria-required="true" placeholder="Mínimo 8 caracteres"></div>
        <div class="form-row"><label for="r-password-confirm">Confirmar Senha</label><input id="r-password-confirm" name="passwordConfirm" type="password" required aria-required="true"></div>
        <div class="form-row"><label for="r-role">Tipo de conta</label><select id="r-role" name="role"><option value="employee">Funcionário</option><option value="admin">Administrador</option></select></div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
          <small style="color:#ccc">Senha segura: <span id="pwd-strength" style="font-weight:700;color:var(--primary)">-</span></small>
          <div style="text-align:right"><button id="register-btn" class="btn" type="submit">Registrar</button></div>
        </div>
      </form>
      <p style="margin-top:12px">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
