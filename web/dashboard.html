<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard - API Pessoa</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="nav"><div class="brand">API Pessoal</div><div><a href="index.html">Início</a><a href="documentation.html">Docs</a></div></nav>
  <main class="container">
    <div class="grid">
      <div class="card">
        <h3 class="header-title">Funcionários em Atividade</h3>
        <canvas id="activeChart" height="120"></canvas>
      </div>
      <div class="card">
        <h3 class="header-title">Resumo Rápido</h3>
        <p>Total funcionários: <strong>125</strong></p>
        <p>Ativos hoje: <strong>98</strong></p>
        <p>Vagas abertas: <strong>3</strong></p>
      </div>
    </div>
    <div style="margin-top:18px" class="card">
      <h3 class="header-title">Ações</h3>
      <p>Exportar relatório, filtrar por departamento e integrar com parceiros.</p>
      <button class="btn">Exportar CSV</button>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
